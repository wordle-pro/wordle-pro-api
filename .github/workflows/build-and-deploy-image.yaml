name: Docker Image CI for GHCR

on: 
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # This converts your repository name to lowercase automatically
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish_images:
    runs-on: ubuntu-latest
    # CRITICAL: This gives the automatic GITHUB_TOKEN the right to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Sets up Buildx so Docker can utilize advanced caching mechanisms
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # No manual secrets required!
      
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: . # Instructs Docker to build from your root directory
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # These two lines link your build into GitHub's free 10GB cache layer
          cache-from: type=gha
          cache-to: type=gha,mode=max